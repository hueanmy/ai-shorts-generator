<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>tech-news-video — render</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e6edf3;
      position: relative;
    }

    /* ---- Theme tokens (overridden by data-theme) ---- */
    body {
      --accent: #58a6ff;
      --accent-soft: rgba(88, 166, 255, 0.15);
      --bg: #0d1117;
    }
    body[data-theme="danger"]  { --accent: #ff4d2e; --accent-soft: rgba(255,77,46,0.18); }
    body[data-theme="warning"] { --accent: #ffb347; --accent-soft: rgba(255,179,71,0.18); }
    body[data-theme="success"] { --accent: #7ee787; --accent-soft: rgba(126,231,135,0.18); }

    /* ---- Stage + scene stacking ---- */
    .stage { position: absolute; inset: 0; background: var(--bg); }
    .scene {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 5vmin;
    }
    .scene.active { opacity: 1; }

    /* ---- Captions (bottom-anchored) ---- */
    .captions {
      position: absolute;
      left: 5vmin; right: 5vmin;
      bottom: 7vmin;
      text-align: center;
      z-index: 10;
    }
    .caption-en {
      font-weight: 800;
      font-size: min(6vw, 8vh);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 2px 24px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
      margin-bottom: 2vmin;
    }
    .caption-vi {
      font-weight: 500;
      font-size: min(1.9vw, 2.4vh);
      line-height: 1.35;
      opacity: 0.78;
      color: #c9d1d9;
      max-width: 80ch;
      margin: 0 auto;
    }
    @media (orientation: portrait) {
      .caption-en { font-size: 7.5vw; }
      .caption-vi { font-size: 3vw; }
      .captions { bottom: 20vh; }
    }

    /* ---- Scene: hero-text ---- */
    .s-hero {
      background: radial-gradient(circle at 50% 40%, var(--accent-soft), transparent 60%), var(--bg);
    }
    .s-hero .hero-emoji {
      font-size: min(14vw, 20vh);
      filter: drop-shadow(0 0 30px rgba(0,0,0,0.6));
      margin-bottom: 2vmin;
      animation: pulse 1.4s ease-in-out infinite alternate;
    }
    .s-hero .hero-headline {
      font-size: min(8vw, 11vh);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #fff;
      text-align: center;
      line-height: 1;
      max-width: 20ch;
      text-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    .s-hero .hero-headline.accent { color: var(--accent); }
    .s-hero .hero-sub {
      margin-top: 2vmin;
      font-size: min(2.2vw, 3vh);
      opacity: 0.75;
      font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
      letter-spacing: 0.05em;
    }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

    /* ---- Scene: stats-grid ---- */
    .s-stats { background: var(--bg); }
    .stats-wrap {
      display: grid;
      gap: 3vmin;
      width: min(88vw, 1500px);
      margin-bottom: 10vh;
    }
    .stats-wrap[data-cols="2"] { grid-template-columns: 1fr 1fr; }
    .stats-wrap[data-cols="3"] { grid-template-columns: 1fr 1fr 1fr; }
    .stats-wrap[data-cols="4"] { grid-template-columns: 1fr 1fr 1fr 1fr; }
    @media (orientation: portrait) {
      .stats-wrap[data-cols="2"],
      .stats-wrap[data-cols="3"],
      .stats-wrap[data-cols="4"] { grid-template-columns: 1fr 1fr; }
    }
    .stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 4vmin 3vmin;
      text-align: center;
    }
    .stat.accent {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .stat .n {
      font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
      font-size: min(7vw, 10vh);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #fff;
    }
    .stat.accent .n { color: var(--accent); }
    .stat .l {
      margin-top: 1.5vmin;
      font-size: min(1.6vw, 2.2vh);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    /* ---- Scene: code-diff ---- */
    .s-code-diff { background: var(--bg); justify-content: flex-start; padding-top: 8vmin; }
    .diff-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3vmin;
      width: min(90vw, 1600px);
    }
    @media (orientation: portrait) {
      .diff-wrap { grid-template-columns: 1fr; }
    }
    .diff-col {
      border-radius: 14px;
      padding: 3vmin;
      font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
      font-size: min(1.5vw, 2.1vh);
      line-height: 1.6;
      min-height: 30vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .diff-col.bad {
      background: rgba(255, 77, 46, 0.10);
      border: 2px solid rgba(255, 77, 46, 0.55);
    }
    .diff-col.good {
      background: rgba(126, 231, 135, 0.10);
      border: 2px solid rgba(126, 231, 135, 0.55);
    }
    .diff-col .tag {
      font-size: min(1.3vw, 1.8vh);
      text-transform: uppercase;
      letter-spacing: 3px;
      opacity: 0.65;
      margin-bottom: 2vmin;
      font-family: "Inter", sans-serif;
      font-weight: 700;
    }
    .diff-col.bad .tag { color: #ff8b7a; }
    .diff-col.good .tag { color: #7ee787; }
    .diff-col pre {
      white-space: pre-wrap;
      word-break: break-word;
      color: #e6edf3;
      font-size: min(1.9vw, 2.6vh);
    }
    .diff-col.bad pre  { color: #ffb3a7; }
    .diff-col.good pre { color: #a9e0b4; }

    /* ---- Scene: terminal ---- */
    .s-terminal { background: var(--bg); justify-content: flex-start; padding-top: 8vmin; }
    .term {
      background: #0a0e14;
      border: 1px solid #30363d;
      border-radius: 14px;
      width: min(90vw, 1500px);
      padding: 3vmin 3.5vmin;
      font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
      font-size: min(1.6vw, 2.2vh);
      line-height: 1.65;
      box-shadow: 0 12px 48px rgba(0,0,0,0.5);
      min-height: 45vh;
    }
    .term .header { display: flex; gap: 10px; padding-bottom: 2vmin; border-bottom: 1px solid #30363d; margin-bottom: 2vmin; }
    .term .dot { width: 10px; height: 10px; border-radius: 50%; }
    .term .dot.r { background: #ff5f56; } .term .dot.y { background: #ffbd2e; } .term .dot.g { background: #27c93f; }
    .term .line { display: block; }
    .term .line.prompt::before { content: "$ "; color: #7ee787; font-weight: 700; }
    .term .line.output { color: #8b949e; }
    .term .line.error  { color: #ff6b6b; }
    .term .line.success { color: #7ee787; }
    .term .cursor { display: inline-block; width: 0.6em; height: 1em; vertical-align: middle; background: var(--accent); animation: blink 1s step-end infinite; margin-left: 2px; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ---- Scene: quote ---- */
    .s-quote {
      background: radial-gradient(circle at 50% 50%, var(--accent-soft), transparent 60%), var(--bg);
    }
    .quote-text {
      font-size: min(5vw, 7vh);
      font-weight: 700;
      font-style: italic;
      max-width: 24ch;
      text-align: center;
      line-height: 1.2;
      color: #fff;
      padding: 0 5vmin;
      position: relative;
    }
    .quote-text::before {
      content: "\201C";
      font-size: 2em;
      color: var(--accent);
      position: absolute;
      top: -0.5em; left: -0.2em;
      opacity: 0.5;
    }
    .quote-attr {
      margin-top: 3vmin;
      font-size: min(2vw, 2.7vh);
      opacity: 0.7;
      font-family: "SF Mono", monospace;
      color: var(--accent);
      letter-spacing: 0.1em;
    }
    .quote-attr::before { content: "— "; }

    /* ---- Scene: iframe ---- */
    .s-iframe { background: var(--bg); justify-content: flex-start; padding-top: 4vmin; }
    .iframe-wrap {
      position: relative;
      width: min(90vw, 1600px);
      height: 62vh;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 12px 48px rgba(0,0,0,0.5);
      border: 1px solid #30363d;
    }
    @media (orientation: portrait) {
      .iframe-wrap { width: 94vw; height: 55vh; }
    }
    .iframe-wrap iframe { width: 100%; height: 100%; border: 0; background: #fff; }
    .iframe-badge {
      position: absolute;
      top: 4vmin; right: 4vmin;
      background: linear-gradient(135deg, var(--accent), rgba(0,0,0,0.6));
      color: #fff;
      padding: 1.8vmin 2.8vmin;
      border-radius: 12px;
      font-weight: 700;
      font-size: min(2vw, 2.7vh);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      max-width: 32vw;
    }

    /* ---- Scene: cta-url ---- */
    .s-cta {
      background: radial-gradient(circle at 50% 50%, var(--accent-soft), transparent 60%), var(--bg);
      justify-content: space-evenly;
    }
    .s-cta .captions { position: static; left: auto; right: auto; bottom: auto; }
    .cta-block {
      display: flex; flex-direction: column; align-items: center; gap: 3vmin;
      padding: 0 5vmin; width: 100%;
    }
    .cta-label {
      font-size: min(1.6vw, 2.2vh);
      letter-spacing: 4px; text-transform: uppercase;
      opacity: 0.6; font-weight: 600;
    }
    .cta-url {
      font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
      font-size: min(3.4vw, 4.8vh);
      font-weight: 700;
      color: var(--accent);
      padding: 2.4vmin 4vmin;
      border: 2px solid var(--accent);
      border-radius: 14px;
      background: var(--accent-soft);
      box-shadow: 0 12px 48px rgba(0,0,0,0.3);
      text-align: center;
      word-break: break-all;
      max-width: 90vw;
      animation: glow 1.4s ease-in-out infinite alternate;
    }
    @media (orientation: portrait) {
      .cta-url { font-size: 4.8vw; padding: 3vmin; }
    }
    @keyframes glow {
      from { box-shadow: 0 12px 48px rgba(0,0,0,0.3); }
      to   { box-shadow: 0 12px 64px var(--accent-soft); }
    }
    .cta-sub {
      font-size: min(1.9vw, 2.6vh);
      opacity: 0.8; font-weight: 500; text-align: center;
    }

    /* ---- Progress bar ---- */
    .progress { position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: rgba(255,255,255,0.08); z-index: 100; }
    .progress-fill { height: 100%; width: 0; background: var(--accent); transition: width 0.1s linear; }

    /* ---- Loading state ---- */
    .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="loading" id="loading">loading…</div>
  </div>
  <div class="progress"><div class="progress-fill" id="progress"></div></div>

  <script>
    // ============================================================
    // Engine: data-driven scene renderer
    // Reads ?storyboard=/path/to/foo.json, builds <div class="scene">
    // per entry, runs a timeline that fades one scene in at a time.
    // ============================================================

    const params = new URLSearchParams(location.search);
    const storyboardPath = params.get('storyboard') || '/storyboards/sglang-cve.json';

    // ---- Scene builders (return an HTMLElement for the scene body) ----

    function el(tag, className, content) {
      const e = document.createElement(tag);
      if (className) e.className = className;
      if (content !== undefined) {
        if (typeof content === 'string') e.innerHTML = content;
        else if (Array.isArray(content)) content.forEach(c => e.appendChild(c));
        else e.appendChild(content);
      }
      return e;
    }

    function addCaptions(sceneEl, caption) {
      if (!caption) return;
      const wrap = el('div', 'captions');
      if (caption.en) wrap.appendChild(el('div', 'caption-en', caption.en));
      if (caption.vi) wrap.appendChild(el('div', 'caption-vi', caption.vi));
      sceneEl.appendChild(wrap);
    }

    const builders = {
      'hero-text': (d) => {
        const inner = [];
        if (d.emoji) inner.push(el('div', 'hero-emoji', d.emoji));
        const headline = el('div', 'hero-headline' + (d.accent ? ' accent' : ''),
                            d.headline || d.text || '');
        inner.push(headline);
        if (d.sub) inner.push(el('div', 'hero-sub', d.sub));
        return { className: 's-hero', children: inner };
      },

      'stats-grid': (d) => {
        const stats = (d.stats || []).map(s => {
          const c = el('div', 'stat' + (s.accent ? ' accent' : ''));
          c.appendChild(el('div', 'n', s.big || s.n || '—'));
          c.appendChild(el('div', 'l', s.label || s.l || ''));
          return c;
        });
        const grid = el('div', 'stats-wrap');
        grid.dataset.cols = String(stats.length);
        stats.forEach(s => grid.appendChild(s));
        return { className: 's-stats', children: [grid] };
      },

      'code-diff': (d) => {
        const bad = el('div', 'diff-col bad');
        bad.appendChild(el('div', 'tag', d.badLabel || '✗ vulnerable'));
        bad.appendChild(el('pre', null, escapeHtml(d.bad || '')));
        const good = el('div', 'diff-col good');
        good.appendChild(el('div', 'tag', d.goodLabel || '✓ fixed'));
        good.appendChild(el('pre', null, escapeHtml(d.good || '')));
        const wrap = el('div', 'diff-wrap');
        wrap.appendChild(bad);
        wrap.appendChild(good);
        return { className: 's-code-diff', children: [wrap] };
      },

      'terminal': (d) => {
        const header = el('div', 'header');
        ['r','y','g'].forEach(c => header.appendChild(el('span', 'dot ' + c)));
        header.appendChild(el('span', null, `<span style="opacity:0.6;margin-left:8px;">${escapeHtml(d.title || 'terminal')}</span>`));
        const body = el('div', 'term-body');
        (d.lines || []).forEach(line => {
          const kind = typeof line === 'string' ? 'output' : (line.type || 'output');
          const text = typeof line === 'string' ? line : line.text;
          body.appendChild(el('span', 'line ' + kind, escapeHtml(text)));
        });
        body.appendChild(el('span', 'cursor'));
        const term = el('div', 'term', [header, body]);
        return { className: 's-terminal', children: [term] };
      },

      'quote': (d) => {
        const text = el('div', 'quote-text', escapeHtml(d.text || ''));
        const inner = [text];
        if (d.attr || d.attribution) inner.push(el('div', 'quote-attr', escapeHtml(d.attr || d.attribution)));
        return { className: 's-quote', children: inner };
      },

      'iframe': (d) => {
        const frame = el('iframe');
        frame.src = d.src;
        if (d.sandbox !== undefined) frame.setAttribute('sandbox', d.sandbox);
        const wrap = el('div', 'iframe-wrap', [frame]);
        if (d.badge) {
          const b = el('div', 'iframe-badge', escapeHtml(d.badge));
          wrap.appendChild(b);
        }
        return { className: 's-iframe', children: [wrap] };
      },

      'cta-url': (d) => {
        const block = el('div', 'cta-block');
        if (d.label) block.appendChild(el('div', 'cta-label', escapeHtml(d.label)));
        block.appendChild(el('div', 'cta-url', escapeHtml(d.url || '')));
        if (d.sub) block.appendChild(el('div', 'cta-sub', escapeHtml(d.sub)));
        return { className: 's-cta', children: [block] };
      },
    };

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function buildScene(def, idx) {
      const build = builders[def.type];
      if (!build) {
        console.error('Unknown scene type:', def.type);
        const s = el('div', 'scene');
        s.appendChild(el('div', null, `<div style="color:#f55">Unknown type: ${escapeHtml(def.type)}</div>`));
        return s;
      }
      const { className, children } = build(def);
      const sceneEl = el('div', 'scene ' + className);
      sceneEl.dataset.idx = String(idx);
      children.forEach(c => sceneEl.appendChild(c));
      addCaptions(sceneEl, def.caption);
      return sceneEl;
    }

    // ---- Main ----

    async function main() {
      let storyboard;
      try {
        const res = await fetch(storyboardPath);
        storyboard = await res.json();
      } catch (err) {
        document.getElementById('loading').textContent = 'failed to load ' + storyboardPath;
        console.error(err);
        window.__renderDone = true;
        return;
      }

      const { meta = {}, scenes = [] } = storyboard;
      if (meta.theme) document.body.dataset.theme = meta.theme;
      document.title = meta.title || 'video';

      const stage = document.getElementById('stage');
      stage.removeChild(document.getElementById('loading'));

      // Build timeline
      const timeline = [];
      let t = 0;
      scenes.forEach((def, idx) => {
        const dur = def.duration || 4;
        timeline.push({ idx, start: t, end: t + dur, def });
        t += dur;
      });
      const TOTAL = t;

      // Render scene DOM nodes
      const sceneEls = timeline.map(({ def }, idx) => {
        const el = buildScene(def, idx);
        stage.appendChild(el);
        return el;
      });

      const progressEl = document.getElementById('progress');

      function setActiveScene(idx) {
        sceneEls.forEach((el, i) => el.classList.toggle('active', i === idx));
      }

      // Run loop
      const t0 = performance.now();
      function tick(now) {
        const tt = (now - t0) / 1000;
        progressEl.style.width = Math.min(100, (tt / TOTAL) * 100) + '%';

        const cur = timeline.find(s => tt >= s.start && tt < s.end);
        setActiveScene(cur ? cur.idx : -1);

        if (tt < TOTAL) {
          requestAnimationFrame(tick);
        } else {
          // Hold on final scene.
          setActiveScene(timeline.length - 1);
          window.__renderDone = true;
        }
      }

      // Let fonts + iframes settle briefly before starting.
      setTimeout(() => requestAnimationFrame(tick), 300);
    }

    window.addEventListener('load', main);
  </script>
</body>
</html>
